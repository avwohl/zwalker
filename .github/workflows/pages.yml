name: Deploy GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      # Site root is docs/, plus the walkthrough/solution data the pages link to.
      - name: Assemble site
        run: |
          mkdir -p _site/games/results _site/solutions _site/walkthroughs
          cp -r docs/. _site/
          cp games/results/*.json _site/games/results/
          cp solutions/*.json _site/solutions/
          cp -r walkthroughs/. _site/walkthroughs/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
